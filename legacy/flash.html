<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashMaster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-mesh"></div>

    <header>
        <div class="logo">FlashMaster</div>
        <div class="file-controls">
            <span id="folder-status">No folder selected</span>
            <button id="btn-select-folder" class="btn secondary">Select Folder</button>
            <button id="btn-save" class="btn primary" disabled>Save to Disk</button>
        </div>
    </header>

    <main>
        <div class="card-container">
            <div class="card" id="flashcard">
                <div class="card-face card-front">
                    <div class="card-content">
                        <h2>Question</h2>
                        <p id="card-question">Welcome! Select a folder or add cards to start.</p>
                    </div>
                    <span class="card-hint">Click to flip</span>
                </div>
                <div class="card-face card-back">
                    <div class="card-content">
                        <h2>Answer</h2>
                        <p id="card-answer">Answers will appear here.</p>
                    </div>
                    <span class="card-hint">Click to flip</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="btn-prev" class="btn icon-btn" aria-label="Previous Card">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <span id="card-counter">0 / 0</span>
            <button id="btn-next" class="btn icon-btn" aria-label="Next Card">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
        </div>

        <div class="action-buttons">
            <button id="btn-add-modal" class="btn huge">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                Add Cards
            </button>
        </div>
    </main>

    <!-- Modal -->
    <div id="add-modal" class="modal hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h3>Add New Cards</h3>
                <button id="btn-close-modal" class="btn-close">&times;</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="single">Single</button>
                <button class="tab-btn" data-tab="bulk">Bulk (100+)</button>
            </div>

            <div class="tab-content active" id="tab-single">
                <div class="input-group">
                    <label>Question</label>
                    <input type="text" id="input-question" placeholder="Enter question...">
                </div>
                <div class="input-group">
                    <label>Answer</label>
                    <textarea id="input-answer" placeholder="Enter answer..."></textarea>
                </div>
            </div>

            <div class="tab-content" id="tab-bulk">
                <div class="input-group">
                    <label>Paste Questions & Answers</label>
                    <p class="helper-text">Format: <code>Question ? Answer</code> (one per line)</p>
                    <textarea id="bulk-input" rows="10"
                        placeholder="What is HTML? ? HyperText Markup Language&#10;What is CSS? ? Cascading Style Sheets"></textarea>
                </div>
            </div>

            <div class="modal-footer">
                <button id="btn-add-cards" class="btn primary">Add Cards</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
